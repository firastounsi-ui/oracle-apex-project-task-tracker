- # ====== Region: Overview ====================================
  id: 154747079017261842912
  identification: 
    name: Overview
    type: Cards

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 'Total Tasks' AS card_title,
             COUNT(*) AS card_value
      FROM tasks
      
      UNION ALL
      
      SELECT 'Completed Tasks' AS card_title,
             COUNT(*) AS card_value
      FROM tasks
      WHERE status = 'DONE'
      
      UNION ALL
      
      SELECT 'Open Tasks' AS card_title,
             COUNT(*) AS card_value
      FROM tasks
      WHERE status <> 'DONE'

  order-by: 
    type: None

  layout: 
    sequence: 20
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Cards Container
    template-options: 
    - '#DEFAULT#'
    - t-CardsRegion--hideHeader js-addHiddenHeadingRoleDesc
    render-components: Above Content

  accessibility: 
    use-landmark: true
