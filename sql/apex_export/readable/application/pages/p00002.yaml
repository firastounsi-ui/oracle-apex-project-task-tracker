    series: 
    - # ====== Series: Tasks by Project. ===========================
      id: 154747079927003842921
      identification: 
        name: Tasks by Project.

      execution: 
        sequence: 10

      source: 
        location: Local Database
        type: SQL Query
        sql-query: |
          SELECT
              p.name AS label,
              COUNT(*) AS value,
              p.id AS project_id
          FROM tasks t
          JOIN projects p
              ON p.id = t.project_id
          GROUP BY p.name, p.id
          ORDER BY p.name

      order-by: 
        type: None

      column-mapping: 
        label: LABEL
        value: VALUE
        custom-column: PROJECT_ID

      appearance: 
        assigned-to-y2-axis: false

      link: 
        type: Redirect to Page in this Application
        target: 
          url: 'f?p=&APP_ID.:12:&SESSION.::&DEBUG.:12:P12_PROJECT_FILTER:&PROJECT_ID.'
          page: 12 # Tasks
          clear-cache: 12
          values: 
            p12_project_filter: '&PROJECT_ID.'

      label: 
        show: false

    axes: 
