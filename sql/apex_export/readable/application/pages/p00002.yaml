    series: 
    - # ====== Series: Series 1 ====================================
      id: 154933278415116814681
      identification: 
        name: Series 1

      execution: 
        sequence: 10

      source: 
        location: Local Database
        type: SQL Query
        sql-query: |
          SELECT
              t.status AS label,
              COUNT(*) AS value,
              s.hex_color AS color
          FROM tasks t
          LEFT JOIN status_style s
              ON s.status_code = t.status
          GROUP BY t.status, s.hex_color
          ORDER BY t.status

      order-by: 
        type: None

      column-mapping: 
        label: LABEL
        value: VALUE

      link: 
        type: Redirect to Page in this Application
        target: 
          url: 'f?p=&APP_ID.:12:&SESSION.::&DEBUG.:12:P12_STATUS_FILTER:&LABEL.'
          page: 12 # Tasks
          clear-cache: 12
          values: 
            p12_status_filter: '&LABEL.'

      label: 
        show: true
        position: Automatic
        display-as: Label

