- # ====== Region: Tasks =======================================
  id: 154741333746778288825
  identification: 
    name: Tasks
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          t.id,
          t.title,
          t.status,
          s.hex_color AS status_hex_color,
          t.priority,
          t.created_at,
          p.name AS project_name
      FROM tasks t
      LEFT JOIN status_style s
          ON s.status_code = t.status
      LEFT JOIN projects p
          ON p.id = t.project_id
      WHERE 
          (:P12_STATUS_FILTER IS NULL OR t.status = :P12_STATUS_FILTER)
      AND
          (:P12_PROJECT_FILTER IS NULL OR t.project_id = :P12_PROJECT_FILTER)

  order-by: 
    type: None

  layout: 
    sequence: 10
    parent-region: No Parent
    slot: BODY
